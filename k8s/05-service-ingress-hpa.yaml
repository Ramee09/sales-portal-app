---
# Service for Sales Portal API
apiVersion: v1
kind: Service
metadata:
  name: sales-portal-service
  namespace: sales-portal
  labels:
    app: sales-portal
spec:
  type: ClusterIP
  selector:
    app: sales-portal
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP

---
# Ingress for Sales Portal API
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sales-portal-ingress
  namespace: sales-portal
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-connections: "10"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - sales-portal.example.com
    secretName: sales-portal-tls
  rules:
  - host: sales-portal.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sales-portal-service
            port:
              number: 80

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sales-portal-hpa
  namespace: sales-portal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sales-portal-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
