---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: sales-portal-config
  namespace: sales-portal
data:
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"
  CORS_ORIGIN: "*"
  DB_HOST: "mongodb"
  DB_PORT: "27017"
  DB_NAME: "sales-portal"
  MONGODB_URI: "mongodb://mongodb:27017/sales-portal"
  APP_NAME: "sales-portal"
  APP_VERSION: "1.0.0"

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: sales-portal-secret
  namespace: sales-portal
type: Opaque
stringData:
  JWT_SECRET: "your-jwt-secret-key-change-me-in-production"
  MONGODB_ROOT_USERNAME: "admin"
  MONGODB_ROOT_PASSWORD: "secure-password-change-me"
  STRIPE_API_KEY: "sk_test_your_stripe_key"
  DB_USERNAME: "admin"
  DB_PASSWORD: "secure-password"
